spring:
  application:
    name: actividad
  datasource:
    url: jdbc:mysql://localhost:3306/actividad?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa: 
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
server:
  port: 8080
  servlet:
    context-path: /api
